<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenHW-Studio</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🚀</text></svg>">
    <script>
      // Clear legacy service worker caches before loading anything else.
      (function resetLegacyServiceWorker() {
        if (!('serviceWorker' in navigator)) return;
        const RESET_FLAG = 'openhw_sw_reset_v3';
        navigator.serviceWorker.getRegistrations().then(async (registrations) => {
          if (!registrations || !registrations.length) return;
          try {
            console.log('[SW-Reset] Cleaning up old service workers...');
            await Promise.all(registrations.map((reg) => reg.unregister().catch(() => {})));
            if ('caches' in window) {
              const keys = await caches.keys();
              await Promise.all(keys.map((key) => caches.delete(key).catch(() => {})));
            }
            if (!sessionStorage.getItem(RESET_FLAG)) {
              sessionStorage.setItem(RESET_FLAG, '1');
              console.log('[SW-Reset] Cleanup complete. Please refresh the page if you encounter any issues.');
            }
          } catch (err) {}
        }).catch(() => {});
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Wokwi Elements — Updated version to fix 404 -->
    <script src="https://unpkg.com/@wokwi/elements@1.9.2/dist/wokwi-elements.bundle.js" defer></script>
  </head>
  <body>
    <div id="root">
      <div style="height: 100vh; display: flex; align-items: center; justify-content: center; background: #070b14; color: #00d4ff; font-family: sans-serif;">
        <div style="text-align: center;">
          <div style="width: 40px; height: 40px; border: 3px solid #1e2d47; border-top-color: #00d4ff; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px;"></div>
          <p style="font-size: 14px; letter-spacing: 0.1em; font-weight: 600;">OPENHW STUDIO</p>
          <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
